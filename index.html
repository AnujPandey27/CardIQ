<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0b0b10;--bg2:#111118;--bg3:#16161f;--bg4:#1c1c28;
  --border:#1e1e2c;--border2:#2a2a3c;
  --text:#e2e2f0;--text2:#9090b0;--text3:#55556a;
  --accent:#5b5ef4;--accent2:#7c7ff7;--accent-bg:#16154a;
  --green:#22c55e;--green-bg:#052010;--green-border:#0d3a1a;
  --amber:#f59e0b;--amber-bg:#1a1000;
  --red:#ef4444;--purple:#a78bfa;--cyan:#22d3ee;
  --gold:#d4a017;--gold-bg:#1a1200;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:13.5px;line-height:1.5}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* Layout */
.app{display:flex;min-height:100vh}
.sidebar{width:200px;background:var(--bg2);border-right:1px solid var(--border);padding:1rem 0.6rem;display:flex;flex-direction:column;gap:2px;flex-shrink:0;position:sticky;top:0;height:100vh;overflow-y:auto}
.main{flex:1;min-width:0;overflow:auto;padding:1.6rem}

/* Logo */
.logo{display:flex;align-items:center;gap:8px;padding:0 6px;margin-bottom:1rem}
.logo-icon{width:26px;height:26px;background:var(--accent);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.logo-text{font-size:1rem;font-weight:700;color:#fff;letter-spacing:-.3px}

/* Nav */
.nav-item{display:flex;align-items:center;gap:8px;padding:7px 9px;border-radius:6px;cursor:pointer;font-size:12.5px;color:var(--text2);transition:all .12s;border:none;background:none;width:100%;text-align:left;white-space:nowrap}
.nav-item:hover{background:var(--bg3);color:var(--text)}
.nav-item.active{background:var(--accent-bg);color:var(--accent2);font-weight:500}
.nav-icon{font-size:14px;width:16px;text-align:center;flex-shrink:0}
.nav-badge{background:var(--accent);color:#c0c0ff;font-size:9px;font-weight:700;padding:1px 5px;border-radius:3px;margin-left:auto}
.nav-sep{height:1px;background:var(--border);margin:6px 2px}
.nav-section{font-size:10px;font-weight:600;color:var(--text3);padding:6px 9px 3px;text-transform:uppercase;letter-spacing:.6px}

/* Page header */
.ph{margin-bottom:1.3rem}
.ph h1{font-size:1.3rem;font-weight:700;color:#fff;margin-bottom:2px;letter-spacing:-.3px}
.ph p{font-size:12px;color:var(--text3)}

/* Stats */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px;margin-bottom:1.3rem}
.stat{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px 12px}
.stat-l{font-size:11px;color:var(--text3);margin-bottom:4px}
.stat-v{font-size:1.2rem;font-weight:700;color:#fff;font-family:'Courier New',monospace}
.stat-h{font-size:11px;color:var(--accent2);margin-top:2px}

/* Cards grid */
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:1rem}
.card-vis{border-radius:12px;padding:1.2rem;position:relative;overflow:hidden;min-height:158px;display:flex;flex-direction:column;justify-content:space-between;transition:transform .18s;cursor:pointer}
.card-vis:hover{transform:translateY(-2px)}
.chip{width:26px;height:18px;background:rgba(255,255,255,.25);border-radius:3px;margin-bottom:8px}
.card-num{font-size:12px;letter-spacing:2px;color:rgba(255,255,255,.7);font-family:'Courier New',monospace}
.card-name{font-size:14px;font-weight:600;color:#fff;margin-top:2px}
.card-bank{font-size:11px;color:rgba(255,255,255,.5);margin-top:1px}
.card-net{position:absolute;bottom:10px;right:10px;font-size:10px;font-weight:700;padding:2px 6px;border-radius:3px}
.net-visa{background:#1a1f71;color:#fff}
.net-mc{background:#111;color:#ff5f00}
.net-rupay{background:#b84e00;color:#fff}
.net-amex{background:#016fcb;color:#fff}
.card-acts{position:absolute;top:8px;right:8px;display:flex;gap:4px;opacity:0;transition:opacity .15s}
.card-vis:hover .card-acts{opacity:1}
.iBtn{width:24px;height:24px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px}
.add-card{border:2px dashed var(--border2);border-radius:12px;min-height:158px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;cursor:pointer;background:transparent;color:var(--text3);transition:all .18s;font-size:12.5px}
.add-card:hover{border-color:var(--accent);color:var(--accent2);background:var(--accent-bg)}

/* Filters */
.filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1rem}
.fb{padding:5px 12px;border-radius:20px;font-size:12px;border:1px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;transition:all .15s;white-space:nowrap}
.fb:hover{border-color:var(--border2);color:var(--text);background:var(--bg3)}
.fb.on{background:var(--accent-bg);color:var(--accent2);border-color:#3a3880}

/* Search */
.search-bar{display:flex;align-items:center;gap:8px;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:8px 12px;margin-bottom:1rem}
.search-bar input{background:transparent;border:none;outline:none;color:var(--text);font-size:13px;font-family:inherit;flex:1;min-width:0}
.search-bar input::placeholder{color:var(--text3)}
.search-icon{color:var(--text3);font-size:14px;flex-shrink:0}

/* Cards/grids */
.grid2{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:10px}
.grid3{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px}
.card-tile{background:var(--bg3);border:1px solid var(--border);border-radius:10px;overflow:hidden;transition:border-color .15s,transform .15s}
.card-tile:hover{border-color:var(--border2);transform:translateY(-1px)}
.tile-top{padding:1rem}
.tile-img{height:130px;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:42px}
.tile-name{font-size:13px;font-weight:500;color:var(--text);margin-bottom:5px;line-height:1.4}
.tile-price-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:4px}
.tile-price{font-size:14px;font-weight:700;color:#fff}
.tile-mrp{font-size:11px;color:var(--text3);text-decoration:line-through}
.tile-disc{font-size:11.5px;color:var(--green);font-weight:600}
.tile-store{display:inline-block;background:var(--bg4);color:var(--text2);font-size:10.5px;padding:2px 7px;border-radius:3px;margin-bottom:4px}
.tile-cb{font-size:11.5px;color:var(--purple);margin-bottom:8px}
.buy-btn{display:block;width:100%;padding:7px;background:var(--accent);color:#fff;border:none;border-radius:6px;font-size:12.5px;font-weight:600;cursor:pointer;text-align:center;text-decoration:none;transition:opacity .15s}
.buy-btn:hover{opacity:.85}

/* Offer cards */
.oc{background:var(--bg3);border:1px solid var(--border);border-radius:9px;padding:1rem;transition:border-color .15s}
.oc:hover{border-color:var(--border2)}
.oc-head{display:flex;align-items:center;gap:9px;margin-bottom:8px}
.oc-logo{width:32px;height:32px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.oc-title{font-size:13px;font-weight:600;color:var(--text)}
.oc-sub{font-size:11px;color:var(--text3);margin-top:1px}
.oc-detail{font-size:12px;color:var(--text2);line-height:1.5;margin-top:6px}

/* Badges */
.badge{display:inline-flex;align-items:center;padding:2px 7px;border-radius:20px;font-size:10.5px;font-weight:600;margin-right:4px;margin-top:4px}
.b-green{background:#052010;color:#6ee7b7}
.b-blue{background:#051840;color:#93c5fd}
.b-amber{background:#1a1000;color:#fbbf24}
.b-purple{background:#1a0840;color:#c4b5fd}
.b-cyan{background:#041a20;color:#67e8f9}
.b-red{background:#1a0404;color:#fca5a5}
.b-gold{background:#1a1200;color:#fcd34d}

/* Compare table */
.ctable{width:100%;border-collapse:collapse;font-size:12.5px;background:var(--bg3);border-radius:9px;overflow:hidden;border:1px solid var(--border)}
.ctable th{background:var(--bg4);padding:9px 11px;text-align:left;font-size:11.5px;color:var(--text2);font-weight:500;border-bottom:1px solid var(--border)}
.ctable td{padding:9px 11px;border-bottom:1px solid var(--border);vertical-align:middle}
.ctable tr:last-child td{border-bottom:none}
.ctable tr:hover td{background:var(--bg4)}
.best-td{background:#051a0d !important}
.best-tag{background:#0d3a1a;color:#6ee7b7;font-size:9px;font-weight:700;padding:1px 5px;border-radius:3px;margin-left:4px}
.score-bar{height:4px;background:var(--bg4);border-radius:2px;margin-top:4px;overflow:hidden}
.score-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .4s}

/* Modal */
.modal-wrap{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;z-index:999;padding:1rem}
.modal{background:var(--bg3);border:1px solid var(--border2);border-radius:12px;padding:1.6rem;width:100%;max-width:450px;max-height:88vh;overflow-y:auto}
.modal h2{font-size:1rem;font-weight:700;color:#fff;margin-bottom:1.2rem}
.fg{margin-bottom:.9rem}
.fg label{font-size:12px;color:var(--text2);margin-bottom:4px;display:block;font-weight:500}
.fg input,.fg select{width:100%;background:var(--bg4);border:1px solid var(--border2);border-radius:6px;padding:8px 10px;font-size:13px;color:var(--text);outline:none;font-family:inherit;transition:border-color .15s}
.fg input:focus,.fg select:focus{border-color:var(--accent)}
.fg select{appearance:none;cursor:pointer}
.btn-p{background:var(--accent);color:#fff;border:none;padding:9px 20px;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;transition:opacity .15s}
.btn-p:hover{opacity:.88}
.btn-g{background:transparent;color:var(--text2);border:1px solid var(--border2);padding:9px 20px;border-radius:6px;font-size:13px;cursor:pointer;transition:all .15s}
.btn-g:hover{color:var(--text);border-color:var(--border)}
.ma{display:flex;justify-content:flex-end;gap:8px;margin-top:1.2rem}
.clr-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:5px;margin-top:5px}
.clr-sw{width:100%;aspect-ratio:2/1;border-radius:4px;cursor:pointer;border:2px solid transparent;transition:border-color .15s}
.clr-sw.sel{border-color:#fff}

/* AI area */
.ai-box{background:var(--bg3);border:1px solid var(--border2);border-radius:10px;overflow:hidden}
.ai-query{padding:1rem;border-bottom:1px solid var(--border)}
.ai-query-row{display:flex;gap:8px}
.ai-query input{flex:1;background:var(--bg4);border:1px solid var(--border2);border-radius:6px;padding:8px 12px;font-size:13px;color:var(--text);outline:none;font-family:inherit}
.ai-query input:focus{border-color:var(--accent)}
.ai-results{padding:1rem;min-height:80px;font-size:13px;color:var(--text2);line-height:1.7;white-space:pre-wrap}
.ai-loading{display:flex;align-items:center;gap:8px;color:var(--text3);font-size:12.5px}
.ai-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);animation:pulse 1.2s infinite}
.ai-dot:nth-child(2){animation-delay:.2s}
.ai-dot:nth-child(3){animation-delay:.4s}
@keyframes pulse{0%,100%{opacity:.3}50%{opacity:1}}

/* Discover card */
.disc-card{background:var(--bg3);border:1px solid var(--border);border-radius:11px;overflow:hidden;transition:border-color .15s,transform .15s}
.disc-card:hover{border-color:var(--border2);transform:translateY(-1px)}
.disc-card.top{border-color:var(--accent);border-width:1.5px}
.disc-vis{height:80px;border-radius:8px;margin-bottom:8px;display:flex;align-items:flex-end;padding:8px 10px;position:relative}
.disc-name{font-size:14px;font-weight:700;color:#fff}
.disc-bank{font-size:11px;color:rgba(255,255,255,.5);margin-top:1px}
.disc-top-badge{position:absolute;top:6px;right:6px;background:var(--accent);color:#c0c0ff;font-size:9px;font-weight:700;padding:2px 7px;border-radius:3px}
.disc-body{padding:1rem}
.disc-fee{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.disc-fee-label{font-size:11px;color:var(--text3)}
.disc-fee-val{font-size:13px;font-weight:600;color:var(--text)}
.fee-waiver{font-size:10.5px;color:var(--green);margin-top:1px}
.disc-perks{display:flex;flex-direction:column;gap:4px;margin-bottom:10px}
.disc-perk{font-size:12px;color:var(--text2);display:flex;gap:6px;line-height:1.4}
.disc-perk-dot{color:var(--accent);flex-shrink:0}
.disc-vs{background:var(--bg4);border-radius:7px;padding:9px;margin-bottom:9px}
.disc-vs-title{font-size:10px;font-weight:600;color:var(--text3);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.disc-vs-row{display:flex;justify-content:space-between;font-size:12px;padding:2px 0;border-bottom:1px solid var(--border);align-items:center}
.disc-vs-row:last-child{border:none}
.disc-verdict{font-size:12px;color:var(--purple);background:#1a0840;border-radius:6px;padding:7px 9px;margin-bottom:9px;line-height:1.5}
.disc-actions{display:flex;gap:7px}
.apply-btn{flex:1;padding:8px;background:var(--accent);color:#fff;border:none;border-radius:6px;font-size:12.5px;font-weight:600;cursor:pointer;text-decoration:none;text-align:center;display:block}
.apply-btn:hover{opacity:.88}
.cmp-btn{flex:1;padding:8px;background:transparent;color:var(--accent2);border:1px solid #3a3880;border-radius:6px;font-size:12.5px;cursor:pointer;transition:all .15s}
.cmp-btn:hover{background:var(--accent-bg)}

/* Subscription tiles */
.sub-tile{background:var(--bg3);border:1px solid var(--border);border-radius:9px;padding:1rem;transition:border-color .15s}
.sub-tile:hover{border-color:var(--border2)}
.sub-head{display:flex;align-items:center;gap:9px;margin-bottom:8px}
.sub-logo{width:36px;height:36px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.sub-name{font-size:13.5px;font-weight:600;color:var(--text)}
.sub-cat{font-size:11px;color:var(--text3);margin-top:1px}
.sub-price{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.sub-mrp{font-size:12px;color:var(--text3);text-decoration:line-through}
.sub-final{font-size:14px;font-weight:700;color:#fff}
.sub-saving{font-size:11.5px;color:var(--green);font-weight:600}

/* Movie tiles */
.movie-tile{background:var(--bg3);border:1px solid var(--border);border-radius:9px;overflow:hidden;transition:border-color .15s}
.movie-tile:hover{border-color:var(--border2)}
.movie-poster{height:100px;display:flex;align-items:center;justify-content:center;font-size:40px;background:var(--bg)}
.movie-body{padding:.9rem}
.movie-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:4px}
.movie-venue{font-size:11px;color:var(--text3);margin-bottom:6px}

/* Travel tiles */
.travel-tile{background:var(--bg3);border:1px solid var(--border);border-radius:9px;padding:1rem;transition:border-color .15s}
.travel-tile:hover{border-color:var(--border2)}

/* Gift card tiles */
.gc-tile{background:var(--bg3);border:1px solid var(--border);border-radius:9px;overflow:hidden;transition:border-color .15s,transform .15s}
.gc-tile:hover{border-color:var(--border2);transform:translateY(-1px)}
.gc-banner{height:70px;display:flex;align-items:center;justify-content:center;font-size:32px;font-weight:700}
.gc-body{padding:.9rem}
.gc-name{font-size:13px;font-weight:600;color:var(--text);margin-bottom:4px}
.gc-platform-row{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:6px}
.gc-platform{background:var(--bg4);border:1px solid var(--border2);border-radius:4px;padding:2px 7px;font-size:11px;color:var(--text2);cursor:pointer;transition:all .15s}
.gc-platform:hover{border-color:var(--accent);color:var(--accent2)}
.gc-cost-detail{background:var(--bg4);border-radius:6px;padding:8px;margin-top:7px;font-size:12px}
.gc-cost-row{display:flex;justify-content:space-between;padding:2px 0;border-bottom:1px solid var(--border);color:var(--text2)}
.gc-cost-row:last-child{border:none;font-weight:600;color:var(--green)}

/* Lounge / premium tiles */
.premium-tile{background:var(--bg3);border:1px solid var(--border);border-radius:9px;padding:1rem;transition:border-color .15s}
.premium-tile.gold{border-color:#3a2a00}
.premium-tile.plat{border-color:#2a2a3c}
.prem-head{display:flex;align-items:center;gap:9px;margin-bottom:8px}
.prem-icon{width:34px;height:34px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.prem-name{font-size:13.5px;font-weight:600;color:var(--text)}
.prem-sub{font-size:11px;color:var(--text3);margin-top:1px}

/* Tooltip */
.tooltip{position:relative;display:inline-block}
.tooltip .tip{position:absolute;bottom:120%;left:50%;transform:translateX(-50%);background:#1a1a2a;border:1px solid var(--border2);border-radius:6px;padding:6px 10px;font-size:11.5px;color:var(--text);white-space:nowrap;z-index:10;pointer-events:none;opacity:0;transition:opacity .15s}
.tooltip:hover .tip{opacity:1}

/* Inline row utils */
.row{display:flex;align-items:center;gap:8px}
.col{display:flex;flex-direction:column;gap:4px}
.between{display:flex;justify-content:space-between;align-items:center}
.mt1{margin-top:.5rem}.mt2{margin-top:1rem}.mb1{margin-bottom:.5rem}.mb2{margin-bottom:1rem}
.sep{height:1px;background:var(--border);margin:1rem 0}
.empty{text-align:center;padding:2.5rem;color:var(--text3)}
.empty-icon{font-size:36px;margin-bottom:8px}
.tag{display:inline-block;background:var(--bg4);border:1px solid var(--border2);border-radius:4px;padding:2px 7px;font-size:11px;color:var(--text2)}
.green{color:var(--green)}.amber{color:var(--amber)}.red{color:var(--red)}.purple{color:var(--purple)}.accent{color:var(--accent2)}

/* Calc result */
.calc-result{background:var(--green-bg);border:1px solid var(--green-border);border-radius:8px;padding:1rem;margin-top:1rem}
.calc-row{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid #0d2a18;font-size:13px}
.calc-row:last-child{border:none;font-weight:700;font-size:14px;color:var(--green)}

/* Loading spinner */
.spin{display:inline-block;width:16px;height:16px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}

.note{font-size:11.5px;color:var(--text3);background:var(--bg4);border-radius:6px;padding:8px 12px;border-left:3px solid var(--accent);margin-bottom:1rem;line-height:1.5}

.section-head{font-size:12.5px;font-weight:600;color:var(--text2);margin-bottom:.8rem;text-transform:uppercase;letter-spacing:.5px;display:flex;align-items:center;gap:7px}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 1.5s infinite;flex-shrink:0}

.store-icon-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1rem}
.store-icon-btn{display:flex;flex-direction:column;align-items:center;gap:4px;padding:8px 12px;border:1px solid var(--border);border-radius:7px;background:var(--bg3);cursor:pointer;transition:all .15s;font-size:11px;color:var(--text2);min-width:60px}
.store-icon-btn:hover,.store-icon-btn.sel{border-color:var(--accent);color:var(--accent2);background:var(--accent-bg)}
.store-icon-btn .ico{font-size:22px}

.two-col{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.three-col{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1rem}

/* ── Mobile bottom nav (hidden on desktop) ── */
.mob-nav{display:none}

/* ── Tablet: collapse sidebar to icons only ── */
@media(max-width:900px){
  .sidebar{width:52px;padding:.6rem .4rem}
  .logo-text,.nav-badge,.nav-section,.nav-sep{display:none}
  .logo{justify-content:center;padding:0;margin-bottom:.8rem}
  .nav-item{justify-content:center;padding:9px 0}
  .nav-item span:last-child:not(.nav-icon){display:none}
  .nav-icon{width:auto;font-size:18px}
  .main{padding:1.1rem}
}

/* ── Mobile portrait (≤700px): bottom nav, full width ── */
@media(max-width:700px){
  .sidebar{display:none}
  .mob-nav{
    display:flex;position:fixed;bottom:0;left:0;right:0;z-index:900;
    background:var(--bg2);border-top:1px solid var(--border2);
    overflow-x:auto;-webkit-overflow-scrolling:touch;
    padding-bottom:env(safe-area-inset-bottom);
    scrollbar-width:none;
  }
  .mob-nav::-webkit-scrollbar{display:none}
  .mob-nav-item{
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:2px;padding:8px 10px;min-width:54px;flex-shrink:0;
    border:none;background:none;color:var(--text3);
    cursor:pointer;font-size:9px;font-family:inherit;
    position:relative;transition:color .12s;
  }
  .mob-nav-item .mn-icon{font-size:17px;line-height:1}
  .mob-nav-item.active{color:var(--accent2)}
  .mob-nav-item.active::after{
    content:'';position:absolute;top:0;left:20%;right:20%;
    height:2px;background:var(--accent);border-radius:0 0 2px 2px;
  }
  .mob-nav-item .mn-badge{
    position:absolute;top:4px;right:5px;
    background:var(--accent);color:#fff;
    font-size:7px;font-weight:700;padding:1px 3px;border-radius:2px;
  }
  .app{flex-direction:column}
  .main{
    padding:.85rem .8rem;
    padding-bottom:calc(62px + env(safe-area-inset-bottom));
    min-height:100svh;
  }
  .ph{margin-bottom:.9rem}
  .ph h1{font-size:1.1rem}
  .ph p{font-size:11.5px}
  .stats{grid-template-columns:1fr 1fr;gap:5px;margin-bottom:.9rem}
  .stat{padding:8px 9px}
  .stat-v{font-size:1rem}
  .cards-grid{grid-template-columns:1fr}
  .card-vis{min-height:142px}
  .card-acts{opacity:1}
  .grid2,.grid3,.two-col,.three-col{grid-template-columns:1fr}
  .filters{flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:3px;scrollbar-width:none}
  .filters::-webkit-scrollbar{display:none}
  .fb{flex-shrink:0}
  .store-icon-row{flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding-bottom:3px}
  .store-icon-row::-webkit-scrollbar{display:none}
  .store-icon-btn{min-width:50px;padding:6px 8px}
  .ctable-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:8px}
  .ctable{min-width:460px}
  .ctable th,.ctable td{padding:6px 8px;font-size:11px}
  .modal-wrap{align-items:flex-end;padding:0}
  .modal{
    max-width:100%;width:100%;border-radius:16px 16px 0 0;
    max-height:88svh;padding:1.1rem .95rem;
    padding-bottom:calc(1.1rem + env(safe-area-inset-bottom));
    overflow-y:auto;
  }
  .ai-query{padding:.75rem}
  .ai-query-row{flex-direction:column;gap:6px}
  .ai-query-row .btn-p{align-self:flex-end;padding:7px 14px}
  .ai-results{padding:.8rem;font-size:12px}
  .btn-p,.btn-g{padding:10px 16px;font-size:13px}
  .iBtn{width:28px;height:28px}
  .note{font-size:11px;padding:6px 9px}
  .section-head{font-size:11.5px}
}

/* ── Landscape phone (height ≤450px): side rail nav ── */
@media(max-height:450px) and (orientation:landscape){
  .mob-nav{
    flex-direction:column;
    top:0;bottom:0;left:0;right:auto;width:50px;
    border-top:none;border-right:1px solid var(--border2);
    overflow-y:auto;overflow-x:hidden;padding:6px 0;
  }
  .mob-nav-item{min-width:auto;width:50px;padding:9px 0;font-size:8px}
  .mob-nav-item.active::after{
    top:10%;bottom:10%;left:0;right:auto;
    width:2px;height:auto;border-radius:0 2px 2px 0;
  }
  .main{
    padding:.65rem .75rem;
    padding-left:calc(50px + .75rem);
    padding-bottom:.65rem;
  }
  .ph h1{font-size:.95rem}
  .stats{grid-template-columns:repeat(auto-fit,minmax(90px,1fr))}
  .grid2{grid-template-columns:repeat(auto-fill,minmax(200px,1fr))}
  .grid3{grid-template-columns:repeat(auto-fill,minmax(160px,1fr))}
  .cards-grid{grid-template-columns:repeat(auto-fill,minmax(210px,1fr))}
  .modal-wrap{align-items:center;padding:.5rem}
  .modal{border-radius:10px;max-height:95svh}
}

/* ── Very small phones (≤380px) ── */
@media(max-width:380px){
  .main{padding:.7rem .65rem}
  .mob-nav-item{min-width:48px;font-size:8.5px;padding:7px 6px}
  .ph h1{font-size:1rem}
  .stats{gap:4px}
  .stat{padding:6px 7px}
}

<div id="root"></div>
<script>
const{useState,useEffect,useRef,useCallback,useMemo}=React;

async function askAI(prompt,onChunk){
  // 1. Try built-in sandbox (free, works on claude.ai)
  try{
    const res=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json","anthropic-dangerous-direct-browser-access":"true"},
      body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:900,system:AI_SYS,messages:[{role:"user",content:prompt}]})
    });
    if(!res.ok)throw new Error("BUILTIN_"+res.status);
    const d=await res.json();
    const text=d?.content?.[0]?.text||"";
    if(text){onChunk(text);return;}
    throw new Error("BUILTIN_empty");
  }catch(e){
    if(!String(e.message).startsWith("BUILTIN_")&&!String(e.message).includes("fetch")){
      onChunk("⚠️ AI error: "+e.message);return;
    }
  }
  // 2. Try user fallback key
  const fb=getActiveFB();
  if(fb){
    const key=loadFBKeys()[fb.id].trim();
    try{
      let res,data;
      if(fb.id==="groq"){
        res=await fetch("https://api.groq.com/openai/v1/chat/completions",{method:"POST",headers:{"Content-Type":"application/json","Authorization":"Bearer "+key},body:JSON.stringify({model:"llama-3.3-70b-versatile",max_tokens:900,messages:[{role:"system",content:AI_SYS},{role:"user",content:prompt}]})});
        if(!res.ok)throw new Error("HTTP_"+res.status);
        data=await res.json();onChunk(data?.choices?.[0]?.message?.content||"");return;
      }
      if(fb.id==="gemini"){
        res=await fetch("https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key="+key,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({systemInstruction:{parts:[{text:AI_SYS}]},contents:[{role:"user",parts:[{text:prompt}]}],generationConfig:{maxOutputTokens:900}})});
        if(!res.ok)throw new Error("HTTP_"+res.status);
        data=await res.json();onChunk(data?.candidates?.[0]?.content?.parts?.[0]?.text||"");return;
      }
      if(fb.id==="openrouter"){
        res=await fetch("https://openrouter.ai/api/v1/chat/completions",{method:"POST",headers:{"Content-Type":"application/json","Authorization":"Bearer "+key,"HTTP-Referer":"https://cardiq.app","X-Title":"CardIQ"},body:JSON.stringify({model:"meta-llama/llama-3.3-70b-instruct:free",max_tokens:900,messages:[{role:"system",content:AI_SYS},{role:"user",content:prompt}]})});
        if(!res.ok)throw new Error("HTTP_"+res.status);
        data=await res.json();onChunk(data?.choices?.[0]?.message?.content||"");return;
      }
    }catch(err){
      const m=String(err.message);
      if(m.includes("401")||m.includes("403"))onChunk("🔑 "+fb.label+" key is invalid. Tap ⚙️ to update.");
      else if(m.includes("429"))onChunk("⏳ Rate limit on "+fb.label+". Try again shortly.");
      else onChunk("⚠️ "+fb.label+" error: "+m);
      return;
    }
  }

}

// Type: "No-Cost EMI" = merchant discounts full interest upfront
//       "Low-Cost EMI" = partially subsidised, rate ≤ 13% p.a.
//       "Standard EMI" = full interest on reducing balance

};
// Default rates for cards not in the above list
const DEFAULT_EMI_RATES = { rates:{3:15,6:15,9:14,12:14,18:15,24:16}, fees:{3:199,6:299,9:0,12:0,18:0,24:0}, lowCostTenures:[] };

function getCardEMIConfig(cardName){ return CARD_EMI_RATES[cardName] || DEFAULT_EMI_RATES; }

function getEMIType(annualRate, isNoCost, isLowCost){
  if(isNoCost) return "No-Cost EMI";
  if(isLowCost) return "Low-Cost EMI";
  return "Standard EMI";
}
function getEMIBadge(type){
  if(type==="No-Cost EMI") return "b-green";
  if(type==="Low-Cost EMI") return "b-amber";
  return "b-blue";
}

function calcEMIPlan(principal, months, annualRate, processingFee, isNoCost, isLowCost){
  const r = annualRate / (12 * 100);
  const gstRate = 0.18;
  const procFeeGST = Math.round(processingFee * gstRate);
  const type = getEMIType(annualRate, isNoCost, isLowCost);

  if(annualRate === 0){
    const totalCost = principal + processingFee + procFeeGST;
    const emi = Math.round(totalCost / months);
    return { months, type, annualRate:0, loanAmt:principal, processingFee, procFeeGST,
      merchantDiscount:0, totalInterest:0, emi, totalGST:procFeeGST,
      totalCost:Math.round(totalCost), schedule:[], noCost:isNoCost, lowCost:isLowCost,
      description:`0% interest. Processing fee ₹${fmt(processingFee)} + GST ₹${fmt(procFeeGST)}.` };
  }

  // Calculate standard EMI on full principal at this card's rate
  const stdEMI = principal * r * Math.pow(1+r, months) / (Math.pow(1+r, months) - 1);
  const totalInterestFull = Math.round(stdEMI * months - principal);

  // No-Cost EMI: merchant discounts the full interest upfront
  const merchantDiscount = isNoCost ? totalInterestFull : 0;
  const loanAmt = principal - merchantDiscount;
  const emi = Math.round(principal / months); // you pay original price ÷ months

  // Amortisation on loanAmt
  let balance = loanAmt;
  let schedTotalInterest=0, schedTotalGST=0, schedTotalEMI=0;
  const schedule = [];

  for(let i=1; i<=months; i++){
    const interestAmt = Math.round(balance * r);
    const principalAmt = i < months ? Math.round(emi - interestAmt) : Math.round(balance);
    const gstOnInterest = Math.round(interestAmt * gstRate);
    const totalPayable = emi + gstOnInterest;
    const endBalance = Math.max(0, Math.round(balance - principalAmt));
    schedTotalInterest += interestAmt;
    schedTotalGST += gstOnInterest;
    schedTotalEMI += emi;
    schedule.push({ month:i, startBal:Math.round(balance), principal:principalAmt,
      interest:interestAmt, emi, gst:gstOnInterest, totalPayable, endBal:endBalance });
    balance = endBalance;
  }

  const totalCost = schedTotalEMI + schedTotalGST + processingFee + procFeeGST;
  const descPrefix = isNoCost
    ? `No-Cost EMI: Merchant discounts ₹${fmt(merchantDiscount)} (total interest). Bank finances ₹${fmt(loanAmt)} @ ${annualRate}% p.a.`
    : isLowCost
      ? `Low-Cost EMI: Subsidised rate ${annualRate}% p.a. on ₹${fmt(principal)}.`
      : `Standard EMI: ${annualRate}% p.a. on ₹${fmt(principal)} reducing balance.`;

  return { months, type, annualRate, loanAmt, processingFee, procFeeGST,
    merchantDiscount, totalInterest:schedTotalInterest, emi,
    totalGST:schedTotalGST, totalCost:Math.round(totalCost),
    schedule, noCost:isNoCost, lowCost:isLowCost,
    description:`${descPrefix} You pay ₹${fmt(emi)}/mo × ${months} months. GST @ 18% on monthly interest.` };
}

function buildEMIPlans(principal, hasNoCostEMI, cardName){
  const cfg = getCardEMIConfig(cardName||"");
  const tenures = [3, 6, 9, 12, 18, 24];
  // No-Cost EMI typically offered on 3, 6, 9, 12 month tenures
  // 18 and 24 months are almost always Standard EMI regardless of merchant
  const noCostEligibleTenures = [3, 6, 9, 12];
  return tenures.map(m => {
    const rate = cfg.rates[m] || 15;
    const fee = cfg.fees[m] || 0;
    const isLowCost = cfg.lowCostTenures.includes(m);
    // No-Cost EMI on all eligible tenures when merchant/card supports it
    const isNoCost = hasNoCostEMI && noCostEligibleTenures.includes(m);
    return calcEMIPlan(principal, m, rate, fee, isNoCost, isLowCost && !isNoCost);
  });
}

// Works with localStorage (standalone HTML), falls back to in-memory if blocked
const VEStore=(()=>{
  const mem={};
  let useLS=true;
  try{localStorage.setItem("__ve_test","1");localStorage.removeItem("__ve_test");}
  catch(e){useLS=false;}
  return{
    get(key){
      try{
        if(useLS){const v=localStorage.getItem(key);return v?JSON.parse(v):null;}
        return mem[key]??null;
      }catch(e){return mem[key]??null;}
    },
    set(key,val){
      try{
        if(useLS)localStorage.setItem(key,JSON.stringify(val));
        else mem[key]=val;
      }catch(e){mem[key]=val;}
    },
    del(key){
      try{if(useLS)localStorage.removeItem(key);else delete mem[key];}
      catch(e){delete mem[key];}
    }
  };
})();

    const ctx=cv.getContext("2d");

    const LAYERS=3;
    const DOTS_PER_LAYER=28;

    class Dot{
      constructor(layer){
        this.layer=layer;
        this.reset(true);
      }
      reset(init){
        this.x=Math.random()*W;
        this.y=init?Math.random()*H:-8;
        const spd=[0.08,0.18,0.34][this.layer];
        this.vy=spd+Math.random()*spd*0.5;
        this.vx=(Math.random()-0.5)*0.06*(this.layer+1);
        this.r=[1,1.6,2.6][this.layer]*(0.7+Math.random()*0.6);
        this.base=[0.09,0.18,0.32][this.layer];
        this.opacity=this.base;
        this.maxOp=this.base;
        this.hue=210+Math.random()*80;
        this.sat=60+Math.random()*25;
        this.lum=65+Math.random()*20;
        this.pulse=Math.random()*Math.PI*2;
        this.pulseSpd=0.008+Math.random()*0.012;
      }
      update(){
        this.y+=this.vy; this.x+=this.vx;
        this.pulse+=this.pulseSpd;
        this.opacity=this.maxOp*(0.75+0.25*Math.sin(this.pulse));
        if(this.y>H+8||this.x<-8||this.x>W+8)this.reset(false);
      }
      draw(){
        ctx.beginPath();
        ctx.arc(this.x,this.y,this.r,0,Math.PI*2);
        ctx.fillStyle=`hsla(${this.hue},${this.sat}%,${this.lum}%,${this.opacity})`;
        ctx.fill();
      }

    function drawLines(dots){
      for(let i=0;i<dots.length;i++){
        for(let j=i+1;j<dots.length;j++){
          const a=dots[i],b=dots[j];
          if(Math.abs(a.layer-b.layer)>1)continue;
          const dx=a.x-b.x,dy=a.y-b.y,d=Math.sqrt(dx*dx+dy*dy);
          const maxD=[160,130,100][Math.min(a.layer,b.layer)];
          if(d>maxD)continue;
          const alpha=0.06*(1-d/maxD)*(a.opacity+b.opacity)*2.5;
          ctx.beginPath();
          ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);
          ctx.strokeStyle=`hsla(${a.hue},60%,70%,${alpha})`;
          ctx.lineWidth=0.5;
          ctx.stroke();

      ctx.clearRect(0,0,W,H);

      drawLines(dots);
      dots.forEach(d=>{d.update();d.draw();});
      rafRef.current=requestAnimationFrame(frame);
    }

function ProfileModal({user,onSave,onLogout,onClose}){

    if(phone&&!/^[6-9]\d{9}$/.test(phone.replace(/\s/g,""))){setErr("Enter a valid 10-digit Indian mobile number.");return;}
    if(email&&!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){setErr("Enter a valid email address.");return;}
    onSave({...user,name,email,phone});onClose();

      React.createElement("div",{className:"fg"},React.createElement("label",null,"Display name"),React.createElement("input",{value:name,onChange:e=>setName(e.target.value)})),

        React.createElement("div",{style:{fontWeight:"600",color:"var(--amber)",marginBottom:"6px"}},"🛡️ Your data & security"),

function App(){
  const[user,setUser]=useState(null);
  const[page,setPage]=useState("cards");
  const[cards,setCards]=useState(INITIAL_CARDS);
  const[showAdd,setSA]=useState(false);
  const[editCard,setEC]=useState(null);
  const[showProfile,setSP]=useState(false);
  const[authChecked,setAuthChecked]=useState(false);

  // Restore last session on mount (synchronous localStorage)
  useEffect(()=>{
    try{
      const lastKey=VEStore.get("ci_last_user");
      if(lastKey){
        const profile=VEStore.get(lastKey);
        if(profile){
          setUser(profile);
          if(profile.cards&&profile.cards.length>0)setCards(profile.cards);
        }
      }
    }catch(e){}
    setAuthChecked(true);
  },[]);

  // Persist cards whenever they change (if logged in)
  useEffect(()=>{
    if(!user)return;
    try{VEStore.set(user.id,{...user,cards});}catch(e){}
  },[cards,user]);

  function handleLogin(profile){
    // Backfill identifierType for accounts created before this field existed
    if(!profile.identifierType){
      const isPhone=/^\d{10}$/.test(profile.identifier||"");
      profile={...profile,
        identifierType:isPhone?"phone":"email",
        phone:isPhone?profile.identifier:(profile.phone||""),
        email:isPhone?(profile.email||""):profile.identifier,
      };
    }
    setUser(profile);
    if(profile.cards&&profile.cards.length>0)setCards(profile.cards);
    try{VEStore.set("ci_last_user",profile.id);}catch(e){}
  }
  function handleLogout(){
    try{VEStore.del("ci_last_user");}catch(e){}
    setUser(null);setCards(INITIAL_CARDS);setSP(false);
  }
  function handleProfileSave(updated){
    setUser(updated);
    try{VEStore.set(updated.id,{...updated,cards});}catch(e){}
  }

  function addCard(f){setCards(p=>[...p,{...f,id:"c"+Date.now()}]);setSA(false);setEC(null);}
  function delCard(id){setCards(p=>p.filter(c=>c.id!==id));}
  function saveEdit(f){setCards(p=>p.map(c=>c.id===editCard.id?{...c,...f}:c));setEC(null);}

  if(!authChecked)return React.createElement("div",{style:{minHeight:"100vh",background:"var(--bg)",display:"flex",alignItems:"center",justifyContent:"center",color:"var(--text3)",fontSize:"14px"}},
    React.createElement("div",{className:"spin",style:{marginRight:"10px"}}),
    "Loading "+APP_NAME+"..."
  );
  if(!user)return React.createElement(AuthModal,{onLogin:handleLogin});

  return React.createElement("div",{className:"app"},
    React.createElement("div",{className:"sidebar"},
      React.createElement("div",{className:"logo"},React.createElement("div",{className:"logo-icon"},"💎"),React.createElement("div",{className:"logo-text"},APP_NAME)),
      PAGES.map((p,i)=>p.sep?React.createElement("div",{key:i,className:"nav-sep"}):
        React.createElement("button",{key:p.id,className:`nav-item${page===p.id?" active":""}`,onClick:()=>setPage(p.id)},
          React.createElement("span",{className:"nav-icon"},p.icon),
          p.label,
          p.isnew&&React.createElement("span",{className:"nav-badge"},"NEW")
        )
      ),
      React.createElement("div",{style:{marginTop:"auto",paddingTop:"1rem"}}),
      React.createElement("button",{className:"nav-item",onClick:()=>setSP(true)},
        React.createElement("span",{className:"nav-icon"},"👤"),
        React.createElement("span",{style:{maxWidth:"120px",overflow:"hidden",textOverflow:"ellipsis"}},user.name||user.identifier.split("@")[0])
      )
    ),
    React.createElement("nav",{className:"mob-nav"},
      PAGES.filter(p=>!p.sep).map(p=>
        React.createElement("button",{key:p.id,className:`mob-nav-item${page===p.id?" active":""}`,onClick:()=>setPage(p.id)},
          React.createElement("span",{className:"mn-icon"},p.icon),
          p.label.split(" ")[0],
          p.isnew&&React.createElement("span",{className:"mn-badge"},"N")
        )
      ),
      React.createElement("button",{className:`mob-nav-item${showProfile?" active":""}`,onClick:()=>setSP(true)},
        React.createElement("span",{className:"mn-icon"},"👤"),
        "Profile"
      )
    ),
    React.createElement("div",{className:"main"},
      page==="cards"&&React.createElement(CardsPage,{cards,onAdd:()=>setSA(true),onEdit:c=>setEC(c),onDelete:delCard}),
      page==="shop"&&React.createElement(ShopPage,{cards}),
      page==="subs"&&React.createElement(SubscriptionsPage,{cards}),
      page==="giftcards"&&React.createElement(GiftCardsPage,{cards}),
      page==="movies"&&React.createElement(MoviePage,{cards}),
      page==="premium"&&React.createElement(PremiumPage,{cards}),
      page==="travel"&&React.createElement(TravelPage,{cards}),
      page==="compare"&&React.createElement(CompareCardsPage,{cards,onSwitchTab:setPage}),
      page==="discover"&&React.createElement(DiscoverPage,{cards,onSwitchTab:setPage}),
      page==="calc"&&React.createElement(PriceCalculatorPage,{cards}),
      page==="emi"&&React.createElement(EMIPage,{cards}),
      page==="rewards"&&React.createElement(RewardsPage,{cards})
    ),
    (showAdd||editCard)&&React.createElement(AddCardModal,{card:editCard,onClose:()=>{setSA(false);setEC(null)},onSave:editCard?saveEdit:addCard}),
    showProfile&&React.createElement(ProfileModal,{user,onSave:handleProfileSave,onLogout:handleLogout,onClose:()=>setSP(false)})
  );
}
createRoot(document.getElementById("root")).render(React.createElement(App));
